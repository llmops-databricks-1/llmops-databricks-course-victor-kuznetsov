bundle:
  name: artlake

include:
  - resources/*.yml

variables:
  config_root:
    description: "Root path for config files (input keywords, output queries)"
    default: "/Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/files"

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405608833868913.13.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
