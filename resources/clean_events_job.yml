resources:
  jobs:
    clean_events_job:
      name: clean-events
      tags:
        project_name: "artlake"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: generate_language_patterns
          environment_key: default
          python_wheel_task:
            entry_point: artlake-generate-language-patterns
            package_name: artlake
            parameters:
              - "--keywords"
              - "${var.config_root}/config/input/keywords.yml"
              - "--output"
              - "${var.config_root}/config/output/language_patterns.yml"

        - task_key: list_urls
          depends_on:
            - task_key: generate_language_patterns
          environment_key: default
          python_wheel_task:
            entry_point: artlake-clean-events
            package_name: artlake
            parameters:
              - "--mode"
              - "list"
              - "--scraped-pages-table"
              - "artlake.staging.scraped_pages"
              - "--search-results-table"
              - "artlake.staging.search_results"
              - "--env"
              - "${bundle.target}"

        - task_key: clean_events
          depends_on:
            - task_key: list_urls
          for_each_task:
            inputs: "{{tasks.list_urls.values.urls}}"
            concurrency: 10
            task:
              task_key: clean_event_iteration
              max_retries: 1
              environment_key: default
              python_wheel_task:
                entry_point: artlake-clean-events
                package_name: artlake
                parameters:
                  - "--mode"
                  - "clean"
                  - "--url"
                  - "{{input}}"
                  - "--scraped-pages-table"
                  - "artlake.staging.scraped_pages"
                  - "--search-results-table"
                  - "artlake.staging.search_results"
                  - "--raw-events-table"
                  - "artlake.bronze.raw_events"
                  - "--model"
                  - "databricks-meta-llama-3-3-70b-instruct"
                  - "--language-patterns"
                  - "${var.config_root}/config/output/language_patterns.yml"
                  - "--env"
                  - "${bundle.target}"
