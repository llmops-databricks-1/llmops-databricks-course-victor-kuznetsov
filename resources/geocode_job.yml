resources:
  jobs:
    geocode_job:
      name: geocode
      tags:
        project_name: "artlake"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: geocode
          environment_key: default
          python_wheel_task:
            entry_point: artlake-geocode
            package_name: artlake
            parameters:
              - "--raw-events-table"
              - "artlake.bronze.categorised_events"
              - "--target-countries"
              - "NL"
              - "BE"
              - "DE"
              - "FR"
              - "--env"
              - "${bundle.target}"
