resources:
  jobs:
    search_social_job:
      name: search-social
      tags:
        project_name: "artlake"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: search_social
          environment_key: default
          python_wheel_task:
            entry_point: artlake-search-social
            package_name: artlake
            parameters:
              - "--queries"
              - "${var.config_root}/config/output/queries.yml"
              - "--platforms"
              - "${var.config_root}/config/input/social_platforms.yml"
              - "--table"
              - "artlake.staging.search_results"
              - "--max-results"
              - "5"
              - "--batch-size"
              - "5"
              - "--env"
              - "${bundle.target}"
