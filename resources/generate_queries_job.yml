resources:
  jobs:
    generate_queries_job:
      name: generate-queries
      tags:
        project_name: "llmops-databricks-course-victor-kuznetsov"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: generate_queries
          environment_key: default
          python_wheel_task:
            entry_point: artlake-generate-queries
            package_name: artlake
            parameters:
              - "--keywords"
              - "${var.config_root}/config/input/keywords.yml"
              - "--output"
              - "${var.config_root}/config/output/queries.yml"
