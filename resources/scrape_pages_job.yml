resources:
  jobs:
    scrape_pages_job:
      name: scrape-pages
      tags:
        project_name: "artlake"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: list_urls
          environment_key: default
          python_wheel_task:
            entry_point: artlake-scrape-pages
            package_name: artlake
            parameters:
              - "--mode"
              - "list"
              - "--seen-urls-table"
              - "artlake.staging.seen_urls"
              - "--scraped-pages-table"
              - "artlake.staging.scraped_pages"
              - "--limit"
              - "10"
              - "--env"
              - "${bundle.target}"

        - task_key: scrape_pages
          depends_on:
            - task_key: list_urls
          for_each_task:
            inputs: "{{tasks.list_urls.values.urls}}"
            task:
              task_key: scrape_page_iteration
              environment_key: default
              python_wheel_task:
                entry_point: artlake-scrape-pages
                package_name: artlake
                parameters:
                  - "--mode"
                  - "scrape"
                  - "--url"
                  - "{{input}}"
                  - "--scraped-pages-table"
                  - "artlake.staging.scraped_pages"
                  - "--env"
                  - "${bundle.target}"
