resources:
  jobs:
    dedup_job:
      name: dedup
      tags:
        project_name: "artlake"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: dedup
          environment_key: default
          python_wheel_task:
            entry_point: artlake-dedup
            package_name: artlake
            parameters:
              - "--search-results-table"
              - "artlake.staging.search_results"
              - "--seen-urls-table"
              - "artlake.staging.seen_urls"
              - "--env"
              - "${bundle.target}"
