# Per-category keyword dictionaries used by artlake-categorise-rules.
#
# Art categories are matched first (higher precision). If none match,
# non_art keywords are checked as a last-resort filter for clearly
# irrelevant content. Events with no match → "uncertain" (passed to LLM).
#
# Languages: EN, NL, DE, FR (matching the search query languages).
category_keywords:
  open_call:
    EN:
      - open call
      - call for artists
      - call for submissions
      - call for entries
      - apply now
      - submission deadline
      - applications open
      - deadline to apply
    NL:
      - open oproep
      - oproep voor kunstenaars
      - inschrijvingsdeadline
      - deadline inschrijving
      - aanmelden voor
    DE:
      - offener aufruf
      - bewerbungsschluss
      - einreichungsfrist
      - jetzt bewerben
    FR:
      - appel à candidatures
      - appel ouvert
      - appel à artistes
      - date limite de candidature

  exhibition:
    EN:
      - exhibition
      - vernissage
      - opening reception
      - art show
      - group show
      - solo show
      - gallery opening
      - on view until
    NL:
      - tentoonstelling
      - expositie
      - vernissage
      - galerie-opening
    DE:
      - ausstellung
      - vernissage
      - galerie-eröffnung
      - kunstausstellung
    FR:
      - exposition
      - vernissage
      - inauguration de

  workshop:
    EN:
      - workshop
      - masterclass
      - art class
      - art residency
      - artist residency
      - art course
    NL:
      - workshop
      - masterclass
      - kunstles
      - residentie
    DE:
      - workshop
      - masterclass
      - kunstkurs
      - künstlerresidenz
    FR:
      - atelier
      - masterclass
      - cours d'art
      - résidence artistique

  market:
    EN:
      - art market
      - art fair
      - craft fair
      - craft market
      - artisan market
    NL:
      - kunstmarkt
      - kunstbeurs
      - ambachtsmarkt
    DE:
      - kunstmarkt
      - kunstmesse
      - kunstbörse
    FR:
      - marché d'art
      - marché artisanal
      - foire d'art

  non_art:
    EN:
      - football match
      - soccer game
      - basketball game
      - cooking recipe
      - mortgage rate
      - insurance quote
      - cryptocurrency
      - forex trading
    NL:
      - voetbalwedstrijd
      - kookrecept
      - hypotheekadvies
    DE:
      - fußballspiel
      - kochrezept
      - versicherungsangebot
    FR:
      - match de football
      - recette de cuisine
      - devis assurance
